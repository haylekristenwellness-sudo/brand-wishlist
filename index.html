<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hayle's Brand Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #faf7f2;
    --card: #ffffff;
    --ink: #5a1e1c;
    --ink-soft: #7a3331;
    --muted: #b5a89c;
    --line: #ece5d6;
    --line-soft: #f3eee2;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 96px 32px 48px;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
  }

  header .eyebrow {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 8px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(22px, 3vw, 30px);
    letter-spacing: 4px;
    line-height: 1.2;
    text-transform: uppercase;
    margin: 0 0 12px;
  }

  header h1 em {
    display: block;
    font-family: 'Pinyon Script', 'Allura', cursive;
    font-style: normal;
    font-weight: 400;
    font-size: clamp(80px, 12vw, 140px);
    letter-spacing: 0;
    text-transform: none;
    line-height: 1;
    margin: 16px 0 24px;
  }

  header .tagline {
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 19px;
    letter-spacing: 0.2px;
    margin: 0 auto;
    max-width: 540px;
    line-height: 1.55;
  }

  header .divider {
    width: 32px;
    height: 1px;
    background: var(--ink);
    margin: 32px auto 0;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 16px 16px;
    position: sticky;
    top: 0;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
    border-bottom: 1px solid var(--line);
  }

  .toolbar.search-bar {
    position: static;
    border: none;
    padding-top: 32px;
    padding-bottom: 8px;
    background: transparent;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--ink);
    padding: 9px 20px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.25s ease;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    font-weight: 500;
  }

  .filter-btn:hover {
    background: var(--ink);
    color: var(--bg);
  }

  .filter-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .search {
    display: block;
    width: min(100%, 360px);
    margin: 0 auto;
    padding: 12px 22px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    font-size: 12px;
    background: transparent;
    outline: none;
    font-family: inherit;
    letter-spacing: 1.5px;
    color: var(--ink);
    text-align: center;
  }
  .search::placeholder { color: var(--ink); opacity: 0.6; letter-spacing: 2px; font-size: 11px; text-transform: uppercase; }
  .search:focus { background: var(--card); }

  main { padding: 48px 32px 96px; max-width: 1240px; margin: 0 auto; }

  .category {
    margin-bottom: 80px;
    scroll-margin-top: 80px;
  }

  .category-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 8px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  .category-header .ordinal {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    font-weight: 400;
    min-width: 32px;
  }

  .category-header h2 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: 34px;
    letter-spacing: 0.5px;
    margin: 0;
    flex-grow: 1;
    color: var(--ink);
  }

  .category-header h2 em {
    font-style: italic;
    font-weight: 400;
  }

  .category-header .count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .category .blurb {
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 17px;
    margin: 18px 0 32px;
    max-width: 600px;
    line-height: 1.55;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    padding: 28px 24px;
    border: 1px solid var(--line);
    border-radius: 4px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    position: relative;
  }

  .card:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    transform: translateY(-2px);
  }

  .card:hover .handle,
  .card:hover .note,
  .card:hover .priority {
    color: var(--bg);
    opacity: 0.85;
  }

  .card .brand-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 0.2px;
    line-height: 1.2;
  }

  .card .handle {
    font-size: 11px;
    color: var(--ink);
    opacity: 0.7;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.3s ease;
  }

  .card .note {
    font-size: 13px;
    color: var(--ink);
    opacity: 0.85;
    line-height: 1.55;
    flex-grow: 1;
    margin-top: 4px;
    transition: color 0.3s ease;
  }

  .card .priority {
    display: inline-block;
    align-self: flex-start;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 0;
    margin-top: 8px;
    color: var(--ink);
    font-weight: 500;
    transition: color 0.3s ease;
  }
  .priority::before { content: "— "; }
  .priority.dream { opacity: 1; }
  .priority.high  { opacity: 0.75; }
  .priority.open  { opacity: 0.55; }

  .hidden { display: none !important; }

  footer {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-top: 1px solid var(--line);
  }

  footer .divider {
    width: 24px;
    height: 1px;
    background: var(--muted);
    margin: 0 auto 20px;
  }

  @media (max-width: 600px) {
    header { padding: 64px 24px 32px; }
    main { padding: 32px 20px 64px; }
    .category { margin-bottom: 56px; }
    .category-header { flex-wrap: wrap; gap: 8px; }
    .category-header h2 { font-size: 22px; width: 100%; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  const content = document.getElementById("content");
  const filters = document.getElementById("filters");
  const search = document.getElementById("search");

  function render() {
    content.innerHTML = "";
    wishlist.forEach((cat, i) => {
      if (!cat.brands || cat.brands.length === 0) return;
      const section = document.createElement("section");
      section.className = "category";
      section.id = "cat-" + i;
      section.dataset.category = cat.category;

      const ordinal = String(i + 1).padStart(2, "0");
      section.innerHTML = `
        <div class="category-header">
          <span class="ordinal">${ordinal}</span>
          <h2>${cat.category}</h2>
          <span class="count">${cat.brands.length} Brands</span>
        </div>
        ${cat.blurb ? `<p class="blurb">${cat.blurb}</p>` : ""}
        <div class="grid">
          ${cat.brands.map(b => `
            <a class="card" href="https://instagram.com/${b.handle}" target="_blank" rel="noopener" data-name="${b.name.toLowerCase()}" data-handle="${b.handle.toLowerCase()}">
              <span class="brand-name">${b.name}</span>
              <span class="handle">@${b.handle}</span>
              ${b.note ? `<span class="note">${b.note}</span>` : ""}
              ${b.priority ? `<span class="priority ${b.priority}">${b.priority === "dream" ? "Dream Brand" : b.priority === "high" ? "High Interest" : "Open To"}</span>` : ""}
            </a>
          `).join("")}
        </div>
      `;
      content.appendChild(section);
    });

    // filter chips (only categories with brands)
    const populated = wishlist
      .map((c, i) => ({ c, i }))
      .filter(({ c }) => c.brands && c.brands.length > 0);
    filters.innerHTML = `<button class="filter-btn active" data-filter="all">All</button>` +
      populated.map(({ c, i }) => `<button class="filter-btn" data-filter="cat-${i}">${c.category}</button>`).join("");

    filters.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        filters.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const f = btn.dataset.filter;
        document.querySelectorAll(".category").forEach(sec => {
          sec.classList.toggle("hidden", !(f === "all" || sec.id === f));
        });
      });
    });
  }

  search.addEventListener("input", e => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll(".category").forEach(sec => {
      let visibleCount = 0;
      sec.querySelectorAll(".card").forEach(card => {
        const match = !q || card.dataset.name.includes(q) || card.dataset.handle.includes(q);
        card.classList.toggle("hidden", !match);
        if (match) visibleCount++;
      });
      sec.classList.toggle("hidden", visibleCount === 0);
    });
  });

  document.getElementById("date").textContent = new Date().toLocaleDateString("en-US", { month: "long", year: "numeric" });
  render();
</script>
